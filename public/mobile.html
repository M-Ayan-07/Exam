<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>ExamProctor — Mobile Monitor</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#080808;--blue:#4f8ef7;--green:#3fb950;--red:#f85149;--yellow:#e3b341;--text1:#fff;--text2:#a0a0a0;--text3:#525252;--border:rgba(255,255,255,.08);--sans:system-ui,sans-serif}
    body{font-family:var(--sans);background:var(--bg);color:var(--text1);min-height:100dvh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;overflow:hidden}
    header{display:flex;align-items:center;justify-content:space-between;padding:.6rem 1rem;border-bottom:1px solid var(--border);background:rgba(8,8,8,.95);backdrop-filter:blur(12px);z-index:10;flex-shrink:0}
    .hdr-brand{font-size:.85rem;font-weight:600;letter-spacing:-.02em}
    .hdr-brand span{color:var(--blue)}
    .hdr-status{display:flex;align-items:center;gap:.4rem;font-size:.72rem;color:var(--text2)}
    .status-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0;transition:background .3s}
    .status-dot.rec{background:var(--red);animation:blink .9s ease-in-out infinite}
    .status-dot.active{background:var(--green)}
    .status-dot.warn{background:var(--yellow)}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
    .cam-wrap{flex:1;position:relative;background:#000;overflow:hidden;min-height:0}
    #mob-video{width:100%;height:100%;object-fit:cover;display:block}
    .cam-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.75rem;background:rgba(0,0,0,.92);z-index:5;padding:2rem;text-align:center}
    .cam-overlay.hidden{display:none}
    .ts-overlay{position:absolute;top:.5rem;left:.5rem;font-size:.65rem;font-family:monospace;color:rgba(255,255,255,.85);background:rgba(0,0,0,.55);padding:.2rem .45rem;border-radius:4px;z-index:3;pointer-events:none}
    .rec-badge{position:absolute;top:.5rem;right:.5rem;display:flex;align-items:center;gap:.35rem;background:rgba(248,81,73,.15);border:1px solid rgba(248,81,73,.35);border-radius:100px;padding:.2rem .6rem;font-size:.65rem;font-weight:700;color:var(--red);z-index:3}
    .rec-badge.hidden{display:none}
    .rec-timer{font-size:.63rem;color:rgba(255,255,255,.6);font-family:monospace}
    .bottom-panel{background:rgba(8,8,8,.97);border-top:1px solid var(--border);padding:1rem;flex-shrink:0;display:flex;flex-direction:column;gap:.6rem;z-index:10}
    .info-text{font-size:.78rem;color:var(--text2);line-height:1.5}
    .info-text strong{color:var(--text1)}
    #upload-status{display:none;font-size:.78rem;padding:.75rem 1rem;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);line-height:1.7}
    #final-msg{display:none;text-align:center;padding:1rem;font-size:.85rem;color:var(--text2)}
    #final-msg .ico{font-size:2rem;display:block;margin-bottom:.4rem}
    .flip-btn{position:absolute;bottom:.75rem;right:.75rem;background:rgba(255,255,255,.1);border:1px solid var(--border);border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;cursor:pointer;z-index:4;transition:background .2s}
    .flip-btn:hover{background:rgba(255,255,255,.2)}
  </style>
</head>
<body>
  <header>
    <div class="hdr-brand">🛡 Exam<span>Proctor</span> · Mobile</div>
    <div class="hdr-status">
      <span class="status-dot" id="s-dot"></span>
      <span id="s-text">Loading...</span>
    </div>
  </header>

  <div class="cam-wrap">
    <video id="mob-video" autoplay muted playsinline></video>
    <div class="ts-overlay" id="ts-overlay">--:--:--</div>
    <div class="rec-badge hidden" id="rec-badge">⏺ REC <span class="rec-timer" id="rec-timer">00:00</span></div>
    <button class="flip-btn" id="flip-btn" title="Flip camera">🔄</button>
    <div class="cam-overlay" id="cam-overlay">
      <span style="font-size:2.5rem">📱</span>
      <span style="font-size:1rem;font-weight:600">Mobile Monitor</span>
      <span id="overlay-msg" style="font-size:.8rem;color:var(--text2)">Starting camera...</span>
    </div>
  </div>

  <div class="bottom-panel">
    <div class="info-text" id="info-text">Initializing...</div>
    <div id="upload-status"></div>
    <div id="final-msg"></div>
  </div>

  <script>
  (function(){
    const params     = new URLSearchParams(location.search);
    const code       = (params.get('code') || '').toUpperCase().trim();
    const MAX_REC_MS = 30 * 60 * 1000;
    const POLL_MS    = 5000;

    let stream = null, recorder = null, chunks = [], recStart = null;
    let recInterval = null, pollInterval = null, tsInterval = null;
    let sessionId = null, useFront = false, examEnded = false, blob = null;

    // ── UI ────────────────────────────────────────────────────────────────────
    function setStatus(state, text){
      const d = document.getElementById('s-dot');
      const t = document.getElementById('s-text');
      d.className = 'status-dot' + (state ? ' '+state : '');
      t.textContent = text;
      t.style.color = state==='rec'?'var(--red)':state==='active'?'var(--green)':state==='warn'?'var(--yellow)':'var(--text2)';
    }
    function setInfo(html){ document.getElementById('info-text').innerHTML = html; }
    function setOverlayMsg(m){ document.getElementById('overlay-msg').textContent = m; }
    function hideOverlay(){ document.getElementById('cam-overlay').classList.add('hidden'); }

    function showUploadStatus(state, msg){
      const el = document.getElementById('upload-status');
      el.style.display = 'block';
      const bgs = { uploading:'rgba(227,179,65,.08)', success:'rgba(63,185,80,.08)', error:'rgba(248,81,73,.08)' };
      const borders = { uploading:'rgba(227,179,65,.25)', success:'rgba(63,185,80,.25)', error:'rgba(248,81,73,.25)' };
      const colors  = { uploading:'var(--yellow)', success:'var(--green)', error:'var(--red)' };
      el.style.background   = bgs[state]     || 'rgba(255,255,255,.04)';
      el.style.borderColor  = borders[state] || 'rgba(255,255,255,.1)';
      el.style.color        = colors[state]  || 'var(--text2)';
      el.innerHTML = msg;
    }

    function showFinal(type, ico, msg){
      const el = document.getElementById('final-msg');
      const colors = { success:'var(--green)', discard:'var(--text2)', error:'var(--red)' };
      el.innerHTML = `<span class="ico">${ico}</span><span style="color:${colors[type]||'var(--text2)'}">${msg}</span>`;
      el.style.display = 'block';
      document.getElementById('info-text').textContent = '';
      if(stream) stream.getTracks().forEach(t=>t.stop());
      clearInterval(tsInterval);
      document.getElementById('ts-overlay').style.display = 'none';
      setStatus('', 'Done');
    }

    // ── Clock overlay ─────────────────────────────────────────────────────────
    function startClock(){
      tsInterval = setInterval(()=>{
        document.getElementById('ts-overlay').textContent = new Date().toLocaleTimeString();
      }, 1000);
    }

    // ── Camera ────────────────────────────────────────────────────────────────
    async function startCamera(){
      try {
        if(stream) stream.getTracks().forEach(t=>t.stop());
        stream = await navigator.mediaDevices.getUserMedia({
          video:{ facingMode: useFront ? 'user' : 'environment', width:{ideal:1280}, height:{ideal:720} },
          audio: true
        });
        document.getElementById('mob-video').srcObject = stream;
        return true;
      } catch(e){
        setOverlayMsg('Camera denied. Please allow access and refresh.');
        setStatus('warn','Camera denied');
        return false;
      }
    }

    document.getElementById('flip-btn').onclick = async () => {
      useFront = !useFront;
      await startCamera();
    };

    // ── Recording ─────────────────────────────────────────────────────────────
    function startRecording(){
      if(!stream) return;
      chunks = [];
      const mime = MediaRecorder.isTypeSupported('video/webm;codecs=vp8,opus')
        ? 'video/webm;codecs=vp8,opus' : 'video/webm';
      recorder = new MediaRecorder(stream, { mimeType: mime, videoBitsPerSecond: 600000 });
      recorder.ondataavailable = e => { if(e.data.size > 0) chunks.push(e.data); };
      recorder.onstop = () => { blob = new Blob(chunks, { type:'video/webm' }); };
      recorder.start(3000);
      recStart = Date.now();

      document.getElementById('rec-badge').classList.remove('hidden');
      recInterval = setInterval(()=>{
        const s = Math.floor((Date.now()-recStart)/1000);
        const mm = String(Math.floor(s/60)).padStart(2,'0');
        const ss = String(s%60).padStart(2,'0');
        document.getElementById('rec-timer').textContent = mm+':'+ss;
        if(Date.now()-recStart >= MAX_REC_MS) stopRecording();
      }, 1000);

      setStatus('rec','Recording');
    }

    function stopRecording(){
      if(recorder && recorder.state !== 'inactive') recorder.stop();
      clearInterval(recInterval);
      document.getElementById('rec-badge').classList.add('hidden');
    }

    // ── Poll server for exam end ───────────────────────────────────────────────
    function startPolling(){
      pollInterval = setInterval(async()=>{
        try{
          const r = await fetch(`/api/dispute/status/${code}`);
          if(!r.ok) return;
          const data = await r.json();
          sessionId = data.sessionId;
          if(data.examEnded && !examEnded){
            examEnded = true;
            clearInterval(pollInterval);
            onExamEnded();
          }
        }catch{}
      }, POLL_MS);
    }

    function onExamEnded(){
      stopRecording();
      setStatus('active','Uploading...');
      setInfo('<strong style="color:var(--text1)">📋 Exam ended.</strong> Auto-uploading your recording now...');
      showUploadStatus('uploading','⏳ Finalizing recording...');
      // Allow MediaRecorder ~1.2s to flush remaining data into blob
      setTimeout(()=>{ autoSubmit(); }, 1200);
    }

    // ── Auto-submit ────────────────────────────────────────────────────────────
    async function autoSubmit(){
      if(!blob || blob.size < 500){
        showUploadStatus('error','⚠️ Recording too short or empty. No video uploaded.');
        return;
      }
      if(!sessionId){
        showUploadStatus('error','⚠️ Session ID missing — inform your invigilator.');
        return;
      }

      const token = localStorage.getItem('token');
      if(!token){
        showUploadStatus('error','⚠️ Not logged in on this device. Inform your invigilator manually.');
        return;
      }

      await doUpload(token, false);
    }

    async function doUpload(token, isRetry){
      showUploadStatus('uploading', isRetry ? '🔄 Retrying upload...' : '📤 Uploading recording to server...');
      try{
        const form = new FormData();
        form.append('video', blob, `defense-${sessionId}.webm`);
        const r = await fetch(`/api/dispute/upload/${sessionId}`, {
          method:'POST',
          headers:{ Authorization:`Bearer ${token}` },
          body: form
        });
        const data = await r.json();
        if(!r.ok) throw new Error(data.error || 'Upload failed');

        showUploadStatus('success',
          '✅ <strong>Recording uploaded successfully.</strong><br/>'
          +'Your invigilator has been notified and will review it. '
          +'<strong>Video is automatically deleted after 24 hours</strong> per our privacy policy.');
        showFinal('success','✅','Submitted. Invigilator will review within 24 hrs.');
      }catch(e){
        if(!isRetry){
          showUploadStatus('error',
            `❌ Upload failed: ${e.message}<br/>`+
            `<span style="opacity:.7">Retrying in 5 seconds...</span>`);
          setTimeout(()=>doUpload(token, true), 5000);
        } else {
          showUploadStatus('error',
            `❌ Retry failed: ${e.message}<br/>`+
            `<span style="opacity:.7">Screenshot this screen and show your invigilator.</span>`);
        }
      }
    }

    // ── Init ──────────────────────────────────────────────────────────────────
    async function init(){
      if(!code){
        setOverlayMsg('No code in URL. Scan the QR code from the exam page.');
        setStatus('warn','Invalid link');
        return;
      }

      setOverlayMsg('Connecting to exam server...');
      try{
        const r = await fetch(`/api/dispute/status/${code}`);
        if(!r.ok) throw new Error();
        const data = await r.json();
        sessionId = data.sessionId;
        if(data.examEnded){
          setOverlayMsg('This exam has already ended. Link expired.');
          setStatus('warn','Exam ended');
          return;
        }
      }catch{
        setOverlayMsg('Invalid or expired code. Check QR code and try again.');
        setStatus('warn','Invalid code');
        return;
      }

      setOverlayMsg('Requesting camera access...');
      const ok = await startCamera();
      if(!ok) return;

      hideOverlay();
      startClock();
      startRecording();
      startPolling();

      setInfo('📡 <strong style="color:var(--text1)">Monitoring active.</strong> Keep this page open and point your camera at the screen. Recording stops and uploads automatically when the exam ends.');
    }

    // Wake lock — keep phone screen on
    let wakeLock = null;
    async function keepAwake(){
      try{ if('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); }catch{}
    }
    document.addEventListener('visibilitychange', async()=>{
      if(document.visibilityState==='visible' && !wakeLock) await keepAwake();
    });

    keepAwake();
    init();
  })();
  </script>
</body>
</html>
